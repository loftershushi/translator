<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>日中 同時通訳</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: #666;
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    .panels {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      background: #222;
      overflow: hidden;
    }

    .panel {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      overflow: hidden;
    }

    /* 上パネルは相手側に向けて逆さま */
    .panel.top { transform: rotate(180deg); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .lang-label {
      font-size: 12px;
      color: #666;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-label .flag { font-size: 16px; }

    .clear-btn {
      background: none;
      border: 1px solid #333;
      color: #555;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .clear-btn:active { background: #333; }

    /* 履歴ログ */
    .log-box {
      flex: 1;
      background: #111;
      border-radius: 10px;
      padding: 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-entry {
      border-left: 2px solid #333;
      padding-left: 8px;
    }

    .log-original {
      font-size: 12px;
      color: #666;
      margin-bottom: 2px;
    }

    .log-translated {
      font-size: 15px;
      color: #fff;
      font-weight: 600;
      line-height: 1.5;
    }

    /* 認識中ライブテキスト */
    .live-text {
      font-size: 13px;
      color: #f90;
      min-height: 18px;
      flex-shrink: 0;
    }

    .mic-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel.bottom .mic-btn { background: #1a6ef5; color: #fff; }
    .panel.top    .mic-btn { background: #e63;    color: #fff; }

    .mic-btn.recording { animation: pulse 1s infinite; }
    .panel.bottom .mic-btn.recording { background: #0050d0; }
    .panel.top    .mic-btn.recording { background: #c40; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
      70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
    }
    .recording .dot { opacity: 1; animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .notice {
      text-align: center;
      font-size: 10px;
      color: #333;
      padding: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>同時通訳 / 同声传译</header>

<div class="panels">

  <!-- 上パネル：中国語 → 日本語（相手側・逆さま） -->
  <div class="panel top">
    <div class="panel-header">
      <div class="lang-label"><span class="flag">🇨🇳</span> 中文 → 日本語</div>
      <button class="clear-btn" onclick="clearLog('ZH')">クリア</button>
    </div>
    <div class="log-box" id="logZH"></div>
    <div class="live-text" id="liveZH"></div>
    <button class="mic-btn" id="btnZH" onclick="toggleRec('zh-CN')">
      <span class="dot"></span> 🎙 中文で話す
    </button>
  </div>

  <!-- 下パネル：日本語 → 中国語（自分側） -->
  <div class="panel bottom">
    <div class="panel-header">
      <div class="lang-label"><span class="flag">🇯🇵</span> 日本語 → 中文</div>
      <button class="clear-btn" onclick="clearLog('JA')">クリア</button>
    </div>
    <div class="log-box" id="logJA"></div>
    <div class="live-text" id="liveJA"></div>
    <button class="mic-btn" id="btnJA" onclick="toggleRec('ja-JP')">
      <span class="dot"></span> 🎙 日本語で話す
    </button>
  </div>

</div>

<div class="notice">Chrome推奨 | マイクアクセスを許可してください</div>

<script>
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) alert('音声認識非対応です。Chrome（Android/PC）をお使いください。');

  let recognition = null;
  let currentLang = null;

  // ── 録音トグル ──
  function toggleRec(lang) {
    if (currentLang === lang) { stopRec(); }
    else { stopRec(); startRec(lang); }
  }

  function startRec(lang) {
    currentLang = lang;
    const isJA  = lang === 'ja-JP';
    const btn   = document.getElementById(isJA ? 'btnJA' : 'btnZH');
    const liveEl = document.getElementById(isJA ? 'liveJA' : 'liveZH');

    btn.classList.add('recording');
    btn.innerHTML = '<span class="dot"></span> ⏹ 停止';
    liveEl.textContent = '🎤 聞き取り中...';

    recognition = buildRecognition(lang);
    recognition.start();
  }

  // SpeechRecognitionオブジェクトを生成する関数（重複防止のためcontinuous:false）
  function buildRecognition(lang) {
    const isJA  = lang === 'ja-JP';
    const liveEl = document.getElementById(isJA ? 'liveJA' : 'liveZH');

    const rec = new SpeechRec();
    rec.lang = lang;
    rec.interimResults = true;
    rec.continuous = false;  // 1発話ごとに区切る（重複防止）
    rec.maxAlternatives = 1;

    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          liveEl.textContent = '';
          translate(t.trim(), lang);  // 確定したら翻訳
        } else {
          interim += t;
        }
      }
      if (interim) liveEl.textContent = '🎤 ' + interim;
    };

    rec.onerror = (e) => {
      // no-speechは無音なので無視して再起動
      if (e.error === 'no-speech') { restart(lang); return; }
      stopRec();
    };

    // 1発話終わったら自動で再起動（継続録音）
    rec.onend = () => { if (currentLang === lang) restart(lang); };

    return rec;
  }

  // 少し間を置いて再起動（重複防止のため200ms待つ）
  function restart(lang) {
    setTimeout(() => {
      if (currentLang !== lang) return;
      recognition = buildRecognition(lang);
      recognition.start();
    }, 200);
  }

  function stopRec() {
    if (recognition) {
      recognition.onend = null;
      recognition.stop();
      recognition = null;
    }
    const prev = currentLang;
    currentLang = null;

    if (prev === 'ja-JP') {
      document.getElementById('btnJA').classList.remove('recording');
      document.getElementById('btnJA').innerHTML = '<span class="dot"></span> 🎙 日本語で話す';
      document.getElementById('liveJA').textContent = '';
    } else if (prev === 'zh-CN') {
      document.getElementById('btnZH').classList.remove('recording');
      document.getElementById('btnZH').innerHTML = '<span class="dot"></span> 🎙 中文で話す';
      document.getElementById('liveZH').textContent = '';
    }
  }

  // ── 翻訳（Google非公式エンドポイント・無料） ──
  async function translate(text, srcLang) {
    if (!text) return;

    const isJA     = srcLang === 'ja-JP';
    const sl       = isJA ? 'ja' : 'zh-CN';
    const tl       = isJA ? 'zh-CN' : 'ja';
    const speakLang = isJA ? 'zh-CN' : 'ja-JP';  // 読み上げる言語
    const logEl    = document.getElementById(isJA ? 'logJA' : 'logZH');

    // ログにエントリを追加
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<div class="log-original">${text}</div><div class="log-translated">翻訳中...</div>`;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;

    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
      const res  = await fetch(url);
      const json = await res.json();
      const translated = json[0].map(seg => seg[0]).join('');

      entry.querySelector('.log-translated').textContent = translated;
      logEl.scrollTop = logEl.scrollHeight;

      // 翻訳先の言語で読み上げ
      speak(translated, speakLang);
    } catch {
      entry.querySelector('.log-translated').textContent = '⚠ 翻訳失敗（通信確認）';
    }
  }

  // ── 読み上げ ──
  // スマホで正しい言語で読み上げるため、ボイス一覧から言語コードが一致するものを明示的に選ぶ
  function speak(text, langCode) {
    if (!text) return;
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = langCode;
    utter.rate  = 1.0;
    utter.pitch = 1.0;

    // ボイス一覧から langCode に合うものを探して明示的に指定
    // （指定しないとスマホが前回のボイスをそのまま使ってしまう問題を防ぐ）
    const voices = window.speechSynthesis.getVoices();
    const matched = voices.find(v => v.lang === langCode)
                 || voices.find(v => v.lang.startsWith(langCode.slice(0, 2)));
    if (matched) utter.voice = matched;

    window.speechSynthesis.speak(utter);
  }

  // ── 履歴クリア ──
  function clearLog(panel) {
    document.getElementById('log' + panel).innerHTML = '';
  }
</script>

</body>
</html>
