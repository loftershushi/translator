<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>日中 同時通訳</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 16px;
      font-size: 14px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── 2分割レイアウト ── */
    .panels {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      background: #222;
    }

    .panel {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 10px;
      position: relative;
    }

    /* 上パネル（中国語→日本語）は上下反転して持ちやすく */
    .panel.top {
      transform: rotate(180deg);
    }

    .lang-label {
      font-size: 12px;
      color: #666;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-label .flag { font-size: 18px; }

    .transcript-box {
      flex: 1;
      background: #111;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      min-height: 80px;
    }

    .original-text {
      font-size: 15px;
      color: #aaa;
      line-height: 1.5;
      min-height: 20px;
    }

    .translated-text {
      font-size: 18px;
      color: #fff;
      font-weight: 600;
      line-height: 1.6;
      min-height: 24px;
    }

    /* ── マイクボタン ── */
    .mic-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    .panel.bottom .mic-btn {
      background: #1a6ef5;
      color: #fff;
    }

    .panel.top .mic-btn {
      background: #e63; /* 赤系でトップを区別 */
      color: #fff;
    }

    .mic-btn.recording {
      animation: pulse 1s infinite;
    }

    .panel.bottom .mic-btn.recording { background: #0050d0; }
    .panel.top    .mic-btn.recording { background: #c40; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
      70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
    }

    .recording .dot { opacity: 1; animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── 注意書き ── */
    .notice {
      text-align: center;
      font-size: 11px;
      color: #444;
      padding: 8px;
    }
  </style>
</head>
<body>

<header>同時通訳 / 同声传译</header>

<div class="panels">

  <!-- 上パネル：中国語 → 日本語（相手側） -->
  <div class="panel top" id="panelZH">
    <div class="lang-label">
      <span class="flag">🇨🇳</span> 中文 → 日本語
    </div>
    <div class="transcript-box">
      <div class="original-text"  id="origZH">中文を話してください…</div>
      <div class="translated-text" id="transZH"></div>
    </div>
    <button class="mic-btn" id="btnZH" onclick="toggleRec('zh-CN')">
      <span class="dot"></span>
      🎙 中文で話す
    </button>
  </div>

  <!-- 下パネル：日本語 → 中国語（自分側） -->
  <div class="panel bottom" id="panelJA">
    <div class="lang-label">
      <span class="flag">🇯🇵</span> 日本語 → 中文
    </div>
    <div class="transcript-box">
      <div class="original-text"  id="origJA">日本語を話してください…</div>
      <div class="translated-text" id="transJA"></div>
    </div>
    <button class="mic-btn" id="btnJA" onclick="toggleRec('ja-JP')">
      <span class="dot"></span>
      🎙 日本語で話す
    </button>
  </div>

</div>

<div class="notice">※ マイクアクセスを許可してください　|　Chrome推奨</div>

<script>
  // ── 状態管理 ──
  let recognition = null;  // 現在動いているSpeechRecognition
  let currentLang = null;  // 現在録音中の言語

  // ── ブラウザ対応チェック ──
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    alert('このブラウザは音声認識に対応していません。\nChrome（Android/PC）をお使いください。');
  }

  // ── 録音トグル ──
  function toggleRec(lang) {
    if (currentLang === lang) {
      // 同じボタンを押したら停止
      stopRec();
    } else {
      // 別のボタン or 初回 → 既存停止してから開始
      stopRec();
      startRec(lang);
    }
  }

  function startRec(lang) {
    currentLang = lang;
    const isJA = lang === 'ja-JP';
    const btn   = document.getElementById(isJA ? 'btnJA' : 'btnZH');

    // UIを録音中に
    btn.classList.add('recording');
    btn.innerHTML = '<span class="dot"></span> ⏹ 停止';

    // SpeechRecognition 設定
    recognition = new SpeechRec();
    recognition.lang = lang;
    recognition.interimResults = true;   // 途中結果も表示
    recognition.continuous = true;       // 継続モード

    let finalText = '';

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalText += t;
          translate(t, lang);  // 確定分だけ翻訳・読み上げ
        } else {
          interim += t;
        }
      }
      // 認識中テキスト表示
      const origEl = document.getElementById(isJA ? 'origJA' : 'origZH');
      origEl.textContent = finalText + interim;
    };

    recognition.onerror = (e) => {
      console.warn('音声認識エラー:', e.error);
      if (e.error === 'no-speech') return;  // 無音は無視
      stopRec();
    };

    // iOSはcontinuousが止まりやすいので自動再起動
    recognition.onend = () => {
      if (currentLang === lang) recognition.start();
    };

    recognition.start();
  }

  function stopRec() {
    if (recognition) {
      recognition.onend = null;  // 自動再起動を無効化
      recognition.stop();
      recognition = null;
    }
    const prevLang = currentLang;
    currentLang = null;

    // ボタンをリセット
    if (prevLang === 'ja-JP') {
      const btn = document.getElementById('btnJA');
      btn.classList.remove('recording');
      btn.innerHTML = '<span class="dot"></span> 🎙 日本語で話す';
    } else if (prevLang === 'zh-CN') {
      const btn = document.getElementById('btnZH');
      btn.classList.remove('recording');
      btn.innerHTML = '<span class="dot"></span> 🎙 中文で話す';
    }
  }

  // ── 翻訳（Google非公式エンドポイント、無料・APIキー不要） ──
  async function translate(text, srcLang) {
    if (!text.trim()) return;

    const isJA  = srcLang === 'ja-JP';
    const sl    = isJA ? 'ja' : 'zh-CN';
    const tl    = isJA ? 'zh-CN' : 'ja-JP';  // 読み上げ言語に合わせてja-JPを使う
    const transEl = document.getElementById(isJA ? 'transJA' : 'transZH');

    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
      const res  = await fetch(url);
      const json = await res.json();

      // レスポンス構造：[[["翻訳文","原文",...],...],...]
      const translated = json[0].map(seg => seg[0]).join('');
      transEl.textContent = translated;

      // 読み上げ
      speak(translated, tl);
    } catch (err) {
      console.error('翻訳エラー:', err);
      transEl.textContent = '⚠ 翻訳失敗（通信を確認）';
    }
  }

  // ── 読み上げ（Web Speech API TTS） ──
  function speak(text, langCode) {
    if (!text) return;
    window.speechSynthesis.cancel();  // 前の読み上げをキャンセル

    const utter = new SpeechSynthesisUtterance(text);
    // langCodeは 'zh-CN' or 'ja' → そのまま渡す
    utter.lang  = langCode;  // 呼び出し元から正確な言語コードを受け取る
    utter.rate  = 1.0;   // 速度（0.5〜2.0）
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }
</script>

</body>
</html>
